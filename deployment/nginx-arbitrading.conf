# Nginx config for arbitrading bot dashboard
# Deploy at a new subdomain OR as subpath under existing domain.
# Below: subdomain example (arbitrading.duckdns.org -> port 5001 backend)

server {
    listen 80;
    server_name arbitrading.duckdns.org;
    # Redirect all HTTP -> HTTPS (certbot will also add this)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name arbitrading.duckdns.org;

    # TLS certs - set up via certbot (see DEPLOYMENT.md)
    ssl_certificate     /etc/letsencrypt/live/arbitrading.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arbitrading.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Rate limit login attempts (optional)
    limit_req_zone $binary_remote_addr zone=arb_login:10m rate=5r/m;

    # Main proxy
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # Rate-limit login endpoint
    location /login {
        limit_req zone=arb_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Static files directly served (no backend hit)
    location /static/ {
        alias /opt/arbitrading-project/web/static/;
        expires 1h;
    }
}
